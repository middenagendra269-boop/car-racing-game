<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parking Master</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0D1B2A;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 10px;
      touch-action: none;
    }
    h1 { color: #2D6CDF; margin-bottom: 5px; font-size: 1.8rem; }
    .back { color: #2D6CDF; text-decoration: none; font-size: 14px; margin-bottom: 10px; }
    .stats {
      display: flex;
      gap: 15px;
      margin: 10px 0;
      font-size: 14px;
    }
    #gameCanvas {
      border: 3px solid #2D6CDF;
      border-radius: 10px;
      background: #1B263B;
      max-width: 100%;
    }
    .mobile-controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 15px;
      width: 100%;
      max-width: 400px;
    }
    .control-btn {
      background: #1B263B;
      border: 2px solid #2D6CDF;
      color: white;
      padding: 20px;
      font-size: 24px;
      border-radius: 10px;
      user-select: none;
      touch-action: none;
    }
    .control-btn:active {
      background: #2D6CDF;
      transform: scale(0.95);
    }
    .up-btn { grid-column: 2; }
    .left-btn { grid-column: 1; grid-row: 2; }
    .down-btn { grid-column: 2; grid-row: 2; }
    .right-btn { grid-column: 3; grid-row: 2; }
    .pc-controls {
      margin-top: 10px;
      text-align: center;
      color: #888;
      font-size: 12px;
    }
    .pc-controls kbd {
      background: #1B263B;
      border: 1px solid #2D6CDF;
      padding: 2px 6px;
      border-radius: 3px;
    }
    #gameOver {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.95);
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      display: none;
      z-index: 10;
    }
    button {
      background: #2D6CDF;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 15px;
    }
    @media (min-width: 600px) {
      .mobile-controls { display: none; }
    }
  </style>
</head>
<body>
  <h1>Parking Master</h1>
  <a href="index.html" class="back">← Back to Portfolio</a>
  
  <div class="stats">
    <div>Time: <span id="time">0</span>s</div>
    <div>Crashes: <span id="crashes">0</span></div>
    <div>Level: <span id="level">1</span></div>
  </div>
  
  <canvas id="gameCanvas" width="400" height="500"></canvas>
  
  <div class="mobile-controls">
    <button class="control-btn up-btn" id="upBtn">↑</button>
    <button class="control-btn left-btn" id="leftBtn">←</button>
    <button class="control-btn down-btn" id="downBtn">↓</button>
    <button class="control-btn right-btn" id="rightBtn">→</button>
  </div>
  
  <div class="pc-controls">
    PC: <kbd>↑</kbd> Accelerate &nbsp; <kbd>↓</kbd> Reverse &nbsp; <kbd>←</kbd><kbd>→</kbd> Steer
  </div>

  <div id="gameOver">
    <h2 id="gameOverText">Parked!</h2>
    <p>Time: <span id="finalTime">0</span>s</p>
    <button onclick="restartGame()">Next Level</button>
  </div>
