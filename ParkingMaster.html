<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parking Master</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0D1B2A;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 { color: #2D6CDF; margin-bottom: 5px; }
    .back { color: #2D6CDF; text-decoration: none; font-size: 14px; margin-bottom: 15px; }
    .stats {
      display: flex;
      gap: 20px;
      margin: 15px 0;
      font-size: 16px;
    }
    #gameCanvas {
      border: 3px solid #2D6CDF;
      border-radius: 10px;
      background: #1B263B;
    }
    .controls {
      margin-top: 15px;
      text-align: center;
      color: #888;
      font-size: 14px;
    }
    .controls kbd {
      background: #1B263B;
      border: 1px solid #2D6CDF;
      padding: 2px 6px;
      border-radius: 3px;
    }
    #gameOver {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.95);
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      display: none;
    }
    button {
      background: #2D6CDF;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <h1>Parking Master</h1>
  <a href="index.html" class="back">← Back to Portfolio</a>
  
  <div class="stats">
    <div>Time: <span id="time">0</span>s</div>
    <div>Crashes: <span id="crashes">0</span></div>
    <div>Level: <span id="level">1</span></div>
  </div>
  
  <canvas id="gameCanvas" width="400" height="500"></canvas>
  
  <div class="controls">
    <kbd>↑</kbd> Accelerate &nbsp; <kbd>↓</kbd> Reverse &nbsp; <kbd>←</kbd><kbd>→</kbd> Steer
  </div>

  <div id="gameOver">
    <h2 id="gameOverText">Parked!</h2>
    <p>Time: <span id="finalTime">0</span>s</p>
    <button onclick="restartGame()">Next Level</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const timeEl = document.getElementById('time');
    const crashesEl = document.getElementById('crashes');
    const levelEl = document.getElementById('level');
    const gameOverScreen = document.getElementById('gameOver');
    const gameOverText = document.getElementById('gameOverText');
    const finalTimeEl = document.getElementById('finalTime');

    let car = { x: 200, y: 400, angle: -Math.PI/2, speed: 0, width: 30, height: 50 };
    let keys = {};
    let gameActive = true;
    let startTime = Date.now();
    let crashes = 0;
    let level = 1;
    
    const parkingSpot = { x: 320, y: 80, width: 60, height: 90 };
    const walls = [
      {x: 0, y: 0, w: 400, h: 10}, // top
      {x: 0, y: 490, w: 400, h: 10}, // bottom  
      {x: 0, y: 0, w: 10, h: 500}, // left
      {x: 390, y: 0, w: 10, h: 500}, // right
      {x: 100, y: 200, w: 200, h: 20}, // obstacle
    ];

    document.addEventListener('keydown', e => keys[e.key] = true);
    document.addEventListener('keyup', e => keys[e.key] = false);

    function updateCar() {
      if (!gameActive) return;
      
      // Steering
      if (keys['ArrowLeft']) car.angle -= 0.05 * car.speed;
      if (keys['ArrowRight']) car.angle += 0.05 * car.speed;
      
      // Acceleration
      if (keys['ArrowUp']) car.speed += 0.2;
      if (keys['ArrowDown']) car.speed -= 0.2;
      
      // Friction
      car.speed *= 0.95;
      if (Math.abs(car.speed) < 0.1) car.speed = 0;
      
      // Move
      car.x += Math.cos(car.angle) * car.speed;
      car.y += Math.sin(car.angle) * car.speed;
      
      // Update timer
      timeEl.textContent = Math.floor((Date.now() - startTime) / 1000);
    }

    function checkCollision() {
      // Wall collision
      for (let wall of walls) {
        if (car.x < wall.x + wall.w && car.x + car.width > wall.x &&
            car.y < wall.y + wall.h && car.y + car.height > wall.y) {
          crashes++;
          crashesEl.textContent = crashes;
          car.speed = 0;
          car.x = 200; car.y = 400; car.angle = -Math.PI/2; // reset
        }
      }
      
      // Check parking
      if (car.x > parkingSpot.x && car.x + car.width < parkingSpot.x + parkingSpot.width &&
          car.y > parkingSpot.y && car.y + car.height < parkingSpot.y + parkingSpot.height &&
          Math.abs(car.speed) < 0.5) {
        endGame(true);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, 400, 500);
      
      // Draw parking spot
      ctx.fillStyle = '#2D6CDF';
      ctx.globalAlpha = 0.3;
      ctx.fillRect(parkingSpot.x, parkingSpot.y, parkingSpot.width, parkingSpot.height);
      ctx.globalAlpha = 1;
      ctx.strokeStyle = '#2D6CDF';
      ctx.lineWidth = 3;
      ctx.strokeRect(parkingSpot.x, parkingSpot.y, parkingSpot.width, parkingSpot.height);
      
      // Draw walls
      ctx.fillStyle = '#444';
      walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));
      
      // Draw car
      ctx.save();
      ctx.translate(car.x + car.width/2, car.y + car.height/2);
      ctx.rotate(car.angle);
      ctx.fillStyle = '#E63946';
      ctx.fillRect(-car.width/2, -car.height/2, car.width, car.height);
      ctx.fillStyle = '#A8DADC';
      ctx.fillRect(-car.width/2 + 5, -car.height/2 + 5, car.width - 10, 15); // windshield
      ctx.restore();
    }

    function gameLoop() {
      updateCar();
      checkCollision();
      draw();
      if (gameActive) requestAnimationFrame(gameLoop);
    }

    function endGame(success) {
      gameActive = false;
      gameOverText.textContent = success ? 'Parked!' : 'Crashed!';
      finalTimeEl.textContent = Math.floor((Date.now() - startTime) / 1000);
      gameOverScreen.style.display = 'block';
    }

    function restartGame() {
      level++;
      levelEl.textContent = level;
      car = { x: 200, y: 400, angle: -Math.PI/2, speed: 0, width: 30, height: 50 };
      gameActive = true;
      startTime = Date.now();
      gameOverScreen.style.display = 'none';
      gameLoop();
    }

    gameLoop();
  </script>
</body>
</html>
